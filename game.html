<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Summoner Master</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111827;color:#e5e7eb;font-family:Arial,sans-serif;height:100vh;overflow:hidden}

/* ── HEADER ── */
#header{display:flex;justify-content:space-between;align-items:center;background:#1f2937;padding:4px 12px;border-bottom:2px solid #374151;font-size:12px;gap:12px;height:30px;flex-shrink:0}
.mp-pips{display:flex;gap:2px;align-items:center}
.pip{width:14px;height:14px;border-radius:50%;border:1px solid #555;background:#333;transition:background .2s}
.pip.on{background:#38bdf8;border-color:#38bdf8;box-shadow:0 0 4px #38bdf8}
.shrine-box{background:#1a1a2e;border:1px solid #444;border-radius:4px;padding:2px 8px;font-size:11px}
.shrine-box.danger{border-color:#ef4444;color:#ef4444}

/* ── MAIN WRAPPER ── */
#main-wrapper{display:flex;height:calc(100vh - 44px);overflow:hidden}

/* ── SIDE PANEL ── */
#side-panel{width:190px;min-width:190px;display:flex;flex-direction:column;background:#0f1721;border-right:2px solid #374151}
#ai-preview,#player-preview{flex:1;display:flex;flex-direction:column;padding:6px;min-height:0;overflow:hidden}
#ai-preview{border-bottom:2px solid #374151}
.prev-label{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;flex-shrink:0}
.prev-img{width:100%;flex:1;min-height:0;object-fit:contain;border-radius:6px;display:block}
.prev-info{font-size:9px;line-height:1.5;margin-top:4px;overflow:hidden;flex-shrink:0}
.prev-action{font-size:9px;color:#fbbf24;font-style:italic;margin-top:2px}
.prev-ph{color:#374151;font-size:10px;text-align:center;padding-top:16px}

/* ── BOARD ── */
#board{flex:1;display:grid;grid-template-rows:1.35fr auto 1fr 4px auto;padding:6px;gap:0;overflow:hidden;min-width:0}

/* Zones */
.zone{padding:2px 0;min-height:0;display:flex;flex-direction:column;gap:5px;overflow:hidden}
.line{display:flex;gap:6px;flex:1;background:rgba(255,255,255,0.04);border-radius:6px;padding:6px;align-items:center;justify-content:center;border:1px solid transparent;transition:border-color .2s;min-height:138px;position:relative}
#enemy-df::before{content:'AI Df ↑';position:absolute;top:4px;left:14px;font-size:9px;color:#6b7280bb;pointer-events:none}
#enemy-at::before{content:'AI At ↓';position:absolute;top:4px;left:14px;font-size:9px;color:#6b7280bb;pointer-events:none}
#player-at::before{content:'At Line ↑';position:absolute;top:4px;left:14px;font-size:9px;color:#6b7280bb;pointer-events:none}
#player-df::before{content:'Df Line ↓';position:absolute;top:4px;left:14px;font-size:9px;color:#6b7280bb;pointer-events:none}
.line-at{border-left:3px solid #ef444466}
.line-df{border-left:3px solid #3b82f666}
.divider{background:#374151;height:4px;border-radius:2px;margin:2px 0}

/* ── CARDS ── */
.card{width:88px;height:126px;border-radius:5px;border:2px solid #4b5563;cursor:pointer;position:relative;overflow:hidden;flex-shrink:0;transition:transform .15s,border-color .15s,filter .15s}
.card:hover{transform:translateY(-4px);border-color:#e5e7eb}
.card.attacker{border-color:#ef4444!important;box-shadow:0 0 10px #ef444488}
.card.targetable{border-color:#f87171;animation:blink .7s infinite}
.card.exhausted{filter:brightness(.55) saturate(.4)}
.card.fused{border-color:#fde68a!important;box-shadow:0 0 8px #fde68a66}
.card.fusion-target{border-color:#a78bfa!important;animation:blink-purple .7s infinite;cursor:crosshair}
.card.skill-target{border-color:#34d399!important;animation:blink-green .7s infinite;cursor:crosshair}
.card.interfere-avail{border-color:#f97316!important;animation:blink-orange .7s infinite;cursor:pointer}
.card img{width:100%;height:88px;object-fit:cover;display:block}
.card-info{background:#000c;padding:2px 4px;font-size:9px;line-height:1.3}
.card-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:bold;color:#f9fafb}
.card-stats{color:#9ca3af;display:flex;justify-content:space-between}
.card-lv{position:absolute;top:1px;right:2px;background:#0008;font-size:8px;padding:0 2px;border-radius:2px;color:#fbbf24}
.fused-badge{position:absolute;bottom:26px;left:2px;background:#fde68a;color:#111;font-size:7px;font-weight:bold;border-radius:2px;padding:0 3px;z-index:5}
.mat-peek{position:absolute;bottom:-3px;left:3px;width:26px;height:35px;object-fit:cover;border-radius:3px;border:1px solid #fde68a66;opacity:0.6;z-index:1;pointer-events:none}
.card.enemy .card-info{display:none}
.slot-empty{width:88px;height:126px;border:2px dashed #2d3748;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#374151;font-size:10px;flex-shrink:0}

@keyframes blink{0%,100%{box-shadow:0 0 4px #ef4444}50%{box-shadow:0 0 14px #ef4444}}
@keyframes blink-purple{0%,100%{box-shadow:0 0 4px #a78bfa}50%{box-shadow:0 0 14px #a78bfa}}
@keyframes blink-green{0%,100%{box-shadow:0 0 4px #34d399}50%{box-shadow:0 0 14px #34d399}}

/* ── CONTROLS ── */
#controls{position:relative;display:flex;justify-content:center;align-items:center;gap:8px;background:#1f2937;border-radius:8px;padding:6px 12px;margin:3px 0}
#action-queue{display:none;flex-direction:row;align-items:center;gap:6px;padding:0 6px 0 10px;border-left:2px solid #4b5563;border-right:2px solid #4b5563;margin:0 4px}
#aq-desc{color:#fde68a;font-size:11px;font-weight:bold;line-height:1.4;max-width:320px}
.btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:bold;transition:opacity .2s}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-red{background:#dc2626;color:#fff}
.btn-purple{background:#7c3aed;color:#fff}
.btn-blue{background:#2563eb;color:#fff}
.btn-gray{background:#374151;color:#d1d5db}
.btn-green{background:#16a34a;color:#fff}
.btn-yellow{background:#d97706;color:#fff}
.hand-card.discard-sel,.mystic-card.discard-sel{border-color:#f97316!important;animation:blink-orange .7s infinite;cursor:crosshair}
@keyframes blink-orange{0%,100%{box-shadow:0 0 4px #f97316}50%{box-shadow:0 0 14px #f97316}}
.card.poison-cursed{border-color:#a3e635!important;animation:blink-poison .7s infinite}
@keyframes blink-poison{0%,100%{box-shadow:0 0 4px #a3e635}50%{box-shadow:0 0 18px #a3e635}}
.card.stone-cursed{border-color:#f59e0b!important;animation:blink-stone .7s infinite}
@keyframes blink-stone{0%,100%{box-shadow:0 0 4px #f59e0b}50%{box-shadow:0 0 14px #f59e0b}}
.card.freeze-cursed{border-color:#7dd3fc!important;animation:blink-freeze .7s infinite}
@keyframes blink-freeze{0%,100%{box-shadow:0 0 4px #7dd3fc}50%{box-shadow:0 0 16px #7dd3fc}}
.card.charm-cursed{border-color:#f472b6!important;animation:blink-charm .7s infinite}
@keyframes blink-charm{0%,100%{box-shadow:0 0 4px #f472b6}50%{box-shadow:0 0 16px #f472b6}}
.card.lastdance-cursed{border-color:#fde68a!important;animation:blink-lastdance .7s infinite}
@keyframes blink-lastdance{0%,100%{box-shadow:0 0 4px #fde68a}50%{box-shadow:0 0 18px #fde68a}}
.btn-gold{background:#b45309;color:#fff}

.area-mystic-chip{display:flex;align-items:center;gap:4px;background:#312e81;border:1px solid #6d28d9;border-radius:4px;padding:2px 5px;cursor:pointer;font-size:9px;color:#e9d5ff}
.area-mystic-chip img{width:22px;height:30px;object-fit:cover;border-radius:2px}

/* ── MYSTIC CARDS ── */
.mystic-card{width:88px;height:126px;border-radius:5px;border:2px solid #4c1d95;cursor:pointer;position:relative;overflow:hidden;flex-shrink:0;transition:transform .15s,border-color .15s}
.mystic-card:hover{transform:translateY(-4px);border-color:#a78bfa}
.mystic-card img{width:100%;height:88px;object-fit:cover;display:block}
.mystic-card-info{background:#000c;padding:2px 4px;font-size:8px;line-height:1.3;color:#e9d5ff}
.mystic-card.playable{border-color:#a78bfa;box-shadow:0 0 6px #7c3aed55}
.mystic-card.mystic-sel{border-color:#fde68a!important;box-shadow:0 0 10px #fde68a66}
.card.mystic-attach{border-color:#a78bfa!important;animation:blink-purple .7s infinite;cursor:crosshair}
.mystic-type-badge{position:absolute;top:1px;left:2px;background:#6d28d9aa;color:#e9d5ff;font-size:6px;font-weight:bold;border-radius:2px;padding:0 2px;z-index:5}
.mystic-on-seal{position:absolute;top:1px;right:2px;background:#7c3aed;color:#e9d5ff;font-size:6px;font-weight:bold;border-radius:2px;padding:0 2px;z-index:6;line-height:1.4}
.draw-choice{cursor:pointer;text-align:center;border-radius:8px;padding:6px;transition:background .15s;user-select:none}
.draw-choice:hover{background:rgba(255,255,255,0.06)}
.draw-choice img{border-radius:6px;border:2px solid #4b5563;transition:border-color .15s;display:block}
.draw-choice:hover img{border-color:#34d399}
.draw-choice.disabled{opacity:.35;pointer-events:none}
.draw-choice-label{font-size:12px;font-weight:bold;margin-top:6px}

/* ── HAND ── */
#hand-area{display:flex;flex-direction:column;gap:2px;min-height:0}
#hand{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;padding:4px 2px;overflow-x:auto;min-width:0}
.hand-card.playable{border-color:#34d399}

/* ── MODALS ── */
#atk-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1f2937;border:2px solid #7c3aed;border-radius:10px;padding:14px;z-index:200;min-width:220px;display:none}
#atk-panel.show{display:block}
#atk-panel h3{font-size:13px;color:#fbbf24;margin-bottom:8px}
.atk-opt{display:block;width:100%;margin:4px 0;padding:7px 10px;background:#374151;color:#e5e7eb;border:1px solid #4b5563;border-radius:6px;cursor:pointer;font-size:11px;text-align:left;transition:background .15s}
.atk-opt:hover:not(:disabled){background:#7c3aed;border-color:#7c3aed}
.atk-opt:disabled{opacity:.35;cursor:not-allowed}
.atk-opt span{float:right;color:#9ca3af}

#deploy-modal,#fa-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1f2937;border:2px solid #4b5563;border-radius:10px;padding:14px;z-index:200;min-width:190px}
#deploy-modal.show,#fa-modal.show{display:block}
#deploy-modal h3,#fa-modal h3{font-size:12px;color:#e5e7eb;margin-bottom:8px}
.dopt,.fopt{display:block;width:100%;margin:3px 0;padding:8px;background:#374151;color:#e5e7eb;border:1px solid #4b5563;border-radius:6px;cursor:pointer;font-size:11px;transition:background .15s;text-align:left}
.dopt:hover:not(:disabled),.fopt:hover:not(:disabled){background:#4b5563}
.fopt:disabled{opacity:.35;cursor:not-allowed}

/* ── LOG / RIGHT PANEL ── */
#right-panel{width:210px;min-width:210px;background:#0f1721;border-left:2px solid #374151;display:flex;flex-direction:column;padding:6px;gap:4px}
.right-label{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
#log{flex:1;background:#111;border-radius:6px;padding:4px 8px;font-size:10px;overflow-y:auto;color:#6b7280}
.log-line{padding:1px 0;border-bottom:1px solid #1f2937}
.log-line.hi{color:#fbbf24}.log-line.bad{color:#ef4444}.log-line.good{color:#34d399}
.drag-over{border-color:#34d399!important;background:rgba(52,211,153,0.1)!important}
.ai-hcard{width:50px;height:70px;object-fit:cover;border-radius:3px;border:1px solid #4b5563;cursor:default;flex-shrink:0}
.ai-hcard.htarget{border-color:#ef4444!important;animation:blink .7s infinite;cursor:pointer}

/* ── COMBAT ANIMATION ── */
#combat-anim.show{display:flex}
.ca-panel{position:relative;text-align:center}
.ca-slash{position:absolute;top:20%;left:0%;width:136%;height:5px;background:#ef4444;border-radius:3px;box-shadow:0 0 12px #ef4444,0 0 28px #ef4444aa;transform:rotate(35deg) scaleX(0);transform-origin:left center;transition:transform .22s ease;pointer-events:none;z-index:2}
.ca-dead .ca-slash{transform:rotate(35deg) scaleX(1)}
.ca-dead img{filter:brightness(.28) saturate(.15);transition:filter .22s}
@keyframes ca-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px) rotate(-3deg)}60%{transform:translateX(6px) rotate(2deg)}}
.ca-dead{animation:ca-shake .28s ease}

/* ── TOOLTIP ── */
#tip{position:fixed;pointer-events:none;background:#1f2937;border:1px solid #374151;border-radius:6px;padding:6px 8px;font-size:10px;z-index:300;max-width:160px;line-height:1.5;display:none}

/* Element colors */
.el-fire{color:#f97316}.el-water{color:#38bdf8}.el-earth{color:#a16207}
.el-wind{color:#4ade80}.el-light{color:#fde68a}.el-darkness{color:#a78bfa}.el-colorless{color:#94a3b8}

/* ── WIN SCREEN ── */
#win-screen{display:none;position:fixed;inset:0;background:#000c;z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#win-screen.show{display:flex}
#win-screen h1{font-size:48px;color:#fbbf24;text-shadow:0 0 20px #fbbf24}
#win-screen p{color:#9ca3af;font-size:14px}
#hand::-webkit-scrollbar{height:4px}
#hand::-webkit-scrollbar-track{background:#111827;border-radius:2px}
#hand::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
#hand::-webkit-scrollbar-thumb:hover{background:#4b5563}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;gap:10px;align-items:center">
    <span style="font-size:14px;font-weight:bold;color:#fbbf24">⚔ Summoner Master</span>
    <span id="phase-label" style="font-size:11px;padding:2px 8px;background:#7c3aed;border-radius:4px">-</span>
  </div>
</div>

<div id="main-wrapper">
  <!-- ── SIDE PANEL ── -->
  <div id="side-panel">
    <div id="ai-preview">
      <div class="prev-label">🤖 AI Action</div>
      <div id="ai-prev-body"><div class="prev-ph">-</div></div>
    </div>
    <div id="player-preview">
      <div class="prev-label">👤 Selected</div>
      <div id="pp-body"><div class="prev-ph">hover a card</div></div>
    </div>
  </div>

  <!-- ── BOARD ── -->
  <div id="board">
    <div class="zone">
      <div id="ai-info-bar" style="display:flex;flex-direction:row;align-items:center;background:#1f293799;border-radius:6px;padding:5px 10px;margin-bottom:4px;gap:8px;font-size:11px">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <span style="font-weight:bold;color:#f87171">⚔ AI</span>
          <span>Shrine: <span id="p1-shrine-label" style="color:#ef4444;font-weight:bold">0/15</span></span>
          <span style="display:flex;align-items:center;gap:4px">Mp: <div id="p1-mp-pips" class="mp-pips"></div> <span id="p1-mp-label" style="color:#38bdf8">8</span></span>
        </div>
        <div id="ai-hand-display" style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;flex:2;justify-content:center"></div>
        <div style="display:flex;align-items:center;gap:10px;flex:1;justify-content:flex-end">
          <span>Seal: <span id="p1-deck-count" style="color:#fbbf24">-</span></span>
          <span>Mystic: <span id="p1-mystic-deck-count" style="color:#a78bfa">-</span></span>
        </div>
      </div>
      <div class="line line-df" id="enemy-df" style="flex-direction:row-reverse"></div>
      <div class="line line-at" id="enemy-at" style="flex-direction:row-reverse"></div>
    </div>

    <div id="controls">
      <span id="controls-phase" style="font-size:11px;color:#9ca3af;font-weight:bold;min-width:80px;text-align:center"></span>
      <button class="btn btn-red" id="btn-atk" onclick="declareAttack()" disabled>⚔ Attack</button>
      <button class="btn btn-purple" id="btn-special" onclick="openSpecialPanel()" disabled style="display:none">✦ Special</button>
      <button class="btn btn-gray" onclick="cancelAction()" id="btn-cancel" style="display:none">✕ Cancel</button>
      <button class="btn btn-gray" onclick="onNextPhaseBtn()" id="btn-next">▶ Next Phase</button>
      <div id="action-queue">
        <div id="aq-desc"></div>
        <button id="btn-proceed" class="btn btn-green" onclick="proceedAction()">▶ ไปต่อ</button>
        <button id="btn-aq-cancel" class="btn btn-gray" onclick="cancelHandDiscard()" style="display:none">✕</button>
        <button id="btn-aq-garuda" class="btn btn-yellow" onclick="executeGarudaInterfere()" style="display:none">⚡ Garuda</button>
        <button id="btn-aq-woolwyvern" class="btn btn-yellow" onclick="executeWoolWyvernInterfere()" style="display:none">🌪 Wyvern</button>
        <button id="btn-aq-phoenix" class="btn btn-yellow" onclick="executePhoenixInterfere()" style="display:none">🔥 Phoenix</button>
      </div>
    </div>

    <div class="zone">
      <div class="line line-at" id="player-at"></div>
      <div class="line line-df" id="player-df"></div>
      <div id="player-area-mystics" style="display:none;flex-direction:row;flex-wrap:wrap;gap:4px;padding:4px 6px;margin-top:4px;background:#1e1b4b55;border-radius:6px;align-items:center"></div>
    </div>

    <div class="divider"></div>

    <div id="hand-area">
      <div id="player-info-bar" style="display:flex;flex-direction:row;align-items:center;background:#1f293799;border-radius:6px;padding:5px 10px;gap:8px;font-size:11px">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <span style="font-weight:bold;color:#34d399">👤 Player</span>
          <span>Shrine: <span id="p0-shrine" class="shrine-box" style="font-size:11px;padding:1px 5px">0/15</span></span>
          <span style="display:flex;align-items:center;gap:4px">Mp: <div id="p0-mp" class="mp-pips"></div> <span id="p0-mp-num" style="color:#38bdf8;font-size:10px"></span></span>
        </div>
        <div id="hand" style="flex:2;min-width:0;overflow-x:auto"></div>
        <div style="display:flex;align-items:center;gap:10px;flex:1;justify-content:flex-end">
          <span>Seal:<span id="p0-deck-count" style="color:#fbbf24">-</span></span>
          <span>Mystic:<span id="p0-mystic-deck-count" style="color:#a78bfa">-</span></span>
          <span id="hand-label" style="display:none">0</span>
          <span id="mystic-hand-label" style="display:none">0</span>
          <span id="p0-hand-count" style="display:none">-</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT PANEL (log) ── -->
  <div id="right-panel">
    <div class="right-label">📜 Log</div>
    <div id="log"></div>
  </div>
</div>

<!-- Attack panel -->
<div id="atk-panel">
  <h3>Select Attack</h3>
  <div id="atk-opts"></div>
  <button class="btn btn-gray" onclick="closeAtkPanel()" style="margin-top:6px;width:100%">Cancel</button>
</div>

<!-- Deploy modal -->
<div id="deploy-modal">
  <h3 id="deploy-title">Deploy where?</h3>
  <button class="dopt" onclick="doDeploy('at')">⚔ At Line (Front)</button>
  <button class="dopt" onclick="doDeploy('df')">🛡 Df Line (Back)</button>
  <button class="btn btn-gray" onclick="closeDeployModal()" style="margin-top:4px;width:100%">Cancel</button>
</div>

<!-- Draw choice modal -->
<div id="draw-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1f2937;border:2px solid #4b5563;border-radius:12px;padding:18px 22px;z-index:250;min-width:200px;text-align:center">
  <div style="color:#fde68a;font-size:13px;font-weight:bold;margin-bottom:6px">จั่วการ์ด — เหลือ <span id="draws-left">2</span> ใบ</div>
  <div id="draw-combined-count" style="font-size:11px;color:#9ca3af;margin-bottom:12px">มือรวม 0/7 ใบ</div>
  <div style="display:flex;gap:16px;justify-content:center;align-items:flex-start">
    <div id="draw-choice-seal" class="draw-choice" onclick="doDrawChoice('seal')">
      <img src="cardback/seal.jpg" style="width:70px;height:100px;object-fit:cover">
      <div class="draw-choice-label" style="color:#e5e7eb">🃏 Seal</div>
      <div id="draw-seal-count" style="font-size:10px;color:#9ca3af;margin-top:2px"></div>
    </div>
    <div id="draw-choice-mystic" class="draw-choice" onclick="doDrawChoice('mystic')">
      <img src="cardback/mystic.jpg" style="width:70px;height:100px;object-fit:cover">
      <div class="draw-choice-label" style="color:#a78bfa">✦ Mystic</div>
      <div id="draw-mystic-count" style="font-size:10px;color:#9ca3af;margin-top:2px"></div>
    </div>
  </div>
</div>

<!-- Field action modal -->
<div id="fa-modal">
  <h3 id="fa-title">-</h3>
  <div id="fa-opts"></div>
  <button class="btn btn-gray" onclick="closeFAModal()" style="margin-top:6px;width:100%">Cancel</button>
</div>

<!-- Tooltip -->
<div id="tip"></div>

<!-- Card Viewer -->

let CARD_DB = [];

function convertCard(j) {
  const rtMap = {element:'el', tribe:'tribe', card:'card'};
  function cleanAtk(f) {
    const o = {name: f.atk_name, mp: f.atk_mp};
    if(f.atk_at != null) o.at = f.atk_at;
    if(f.atk_df != null) o.df = f.atk_df;
    if(f.atk_all) o.all = true;
    if(f.atk_sp != null) o.sp = f.atk_sp;
    if(f.atk_hits && f.atk_hits > 1) o.hits = f.atk_hits;
    return o;
  }
  return {
    id: j.id, name: j.name, img: j.path,
    lv: j.lv, at: j.at, df: j.df, sp: j.spd,
    mc: j.mp_deploy, ma: j.mp_attack,
    el: j.element[0], tribe: j.tribe[0],
    fuse: (j.fusions||[]).map(f=>({
      req: f.require,
      rt: rtMap[f.require_type]||f.require_type,
      cnt: f.count,
      atk: cleanAtk(f)
    })),
    skill_text: j.skill_text||null,
    ability_text: j.ability_text||null
  };
}

function loadCardDB() {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', 'OGcarddbseal/cards_metadata.json?v=' + Date.now(), true);
    xhr.onload = () => {
      if(xhr.status === 0 || (xhr.status >= 200 && xhr.status < 300)){
        try {
          const data = JSON.parse(xhr.responseText);
          CARD_DB = data.cards.map(convertCard);
          console.log(`Loaded ${CARD_DB.length} cards from JSON`);
          resolve();
        } catch(e){ reject(e); }
      } else { reject(new Error('HTTP '+xhr.status)); }
    };
    xhr.onerror = reject;
    xhr.send();
  });
}

function loadMysticDB(){
  return new Promise(resolve=>{
    const xhr=new XMLHttpRequest();
    xhr.open('GET','OGcarddbseal/mystics_metadata.json?v='+Date.now(),true);
    xhr.onload=()=>{
      if(xhr.status===0||(xhr.status>=200&&xhr.status<300)){
        try{const data=JSON.parse(xhr.responseText);MYSTIC_DB=data.mystics;console.log(`Loaded ${MYSTIC_DB.length} mystic cards`);}
        catch(e){MYSTIC_DB=_MYSTIC_DB_FALLBACK;}
      } else {MYSTIC_DB=_MYSTIC_DB_FALLBACK;}
      resolve();
    };
    xhr.onerror=()=>{MYSTIC_DB=_MYSTIC_DB_FALLBACK;resolve();};
    xhr.send();
  });
}

function drawMysticCard(pi,silent=false,force=false){
  const p=G.players[pi];
  if(!p.mysticDeck||!p.mysticDeck.length)return;
  if(!force){
    const hmax=getMysticHandMax(pi);
    if((p.mysticHand||[]).length>=hmax)return;
  }
  const c=p.mysticDeck.shift();
  if(!p.mysticHand)p.mysticHand=[];
  p.mysticHand.push({...c});
  if(!silent)log(`${p.name} จั่ว Mystic: ${c.name}`,'');
}

function getMysticHandMax(pi){
  const p=G.players[pi];
  let max=MYSTIC_HAND_MAX;
  (p.areaMystics||[]).forEach(am=>{
    if(am.mystic.id===35)max+=1;
    if(am.mystic.id===70)max-=1;
  });
  return Math.max(1,max);
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function makeFieldCard(card, fromHand=false){
  return {
    uid: Math.random().toString(36).slice(2),
    card,
    exhausted: false,
    hasAttacked: false,
    hasUsedSkill: false,
    atBoosts: [],
    spBoosts: [],
    dfBoosts: [],
    curses: [],
    mystics: [],
    deployedTurn: turnNum,
    fromHand,
    lineSwitchedTurn: -1,
    fusionStack: [],
    fusionAtks: [],
    fused: false,
    fusedSinceTurn: null,
    activeMultiAtk: null,
    hitsLeft: 0,
    willMind: false
  };
}

function buildDeck(){
  const pool=[], counts={};
  while(pool.length<25){
    const avail=CARD_DB.filter(c=>(counts[c.id]||0)<3);
    if(!avail.length)break;
    const c=avail[Math.floor(Math.random()*avail.length)];
    pool.push({...c});
    counts[c.id]=(counts[c.id]||0)+1;
  }
  return shuffle(pool);
}

function buildMysticDeck(){
  if(!MYSTIC_DB.length)return [];
  const pool=[], counts={};
  while(pool.length<20){
    const avail=MYSTIC_DB.filter(c=>(counts[c.id]||0)<2);
    if(!avail.length)break;
    const c=avail[Math.floor(Math.random()*avail.length)];
    pool.push({...c});
    counts[c.id]=(counts[c.id]||0)+1;
  }
  return shuffle(pool);
}

function initDragDrop(){
  ['player-at','player-df'].forEach(id=>{
    const el=document.getElementById(id);
    const targetLine=id==='player-at'?'at':'df';
    el.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';el.classList.add('drag-over');});
    el.addEventListener('dragleave',e=>{if(!el.contains(e.relatedTarget))el.classList.remove('drag-over');});
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over');
      try{
        const data=JSON.parse(e.dataTransfer.getData('text/plain'));
        if(data.type==='hand'){
          const card=G.players[0].hand[data.idx];
          if(!card)return;
          pendingDeploy={card,idx:data.idx};
          doDeploy(targetLine);
        } else if(data.type==='field'){
          const fc=[...G.players[0].atLine,...G.players[0].dfLine].find(f=>f.uid===data.uid);
          if(fc&&data.fromLine!==targetLine)doLineSwitch(fc,data.fromLine,targetLine);
        } else if(data.type==='mystic'){
          const mc=(G.players[0].mysticHand||[])[data.idx];
          if(!mc)return;
          const inMainPhase=(phase==='main'||phase==='main2')&&G.currentPlayer===0;
          const inInterfere=!!pendingCb;
          if(G.players[0].mp>=mc.mc&&(inMainPhase||(mc.interfere&&inInterfere)))showMysticAction(mc,data.idx);
        }
      }catch(err){}
    });
  });
}

function initGame(){
  const d0=buildDeck(), d1=buildDeck();
  G={
    players:[
      {deck:d0,hand:[],atLine:[],dfLine:[],shrine:[],mp:MAX_MP,name:"Player",mysticDeck:buildMysticDeck(),mysticHand:[],areaMystics:[]},
      {deck:d1,hand:[],atLine:[],dfLine:[],shrine:[],mp:MAX_MP,name:"AI",mysticDeck:buildMysticDeck(),mysticHand:[],areaMystics:[]}
    ],
    currentPlayer:0
  };
  for(let i=0;i<5;i++){drawCard(0,true);drawCard(1,true);}
  drawMysticCard(0,true);drawMysticCard(0,true);
  drawMysticCard(1,true);drawMysticCard(1,true);
  console.log('initGame: MYSTIC_DB=',MYSTIC_DB.length,'player mysticDeck=',G.players[0].mysticDeck.length,'mysticHand=',G.players[0].mysticHand.length);
  initDragDrop();
  phase='main';
  log(`Turn ${turnNum} — Player's turn | MAIN PHASE`,'hi');
  render();
}

function drawCard(pi,silent=false,force=false){
  const p=G.players[pi];
  if(!p.deck.length){if(!silent)log(`${p.name} deck empty!`,'bad');checkLose();return;}
  if(!force&&p.hand.length>=HAND_MAX){if(!silent)log(`${p.name} hand full`,'');return;}
  const c=p.deck.shift();
  p.hand.push(c);
  if(!silent)log(`${p.name} drew ${c.name}`);
}

function onNextPhaseBtn(){

function skipToNextPhase(){
  cancelAction();
  if(phase==='draw'){phase='main';log('MAIN PHASE','hi');}
  else if(phase==='main'){phase='battle';log('BATTLE PHASE — select a Seal then click enemy','hi');}
  else if(phase==='main2'){endTurnFromMain2();return;}
  render();
}

function endBattle(){
  cancelAction();
  phase='main2';
  log('MAIN PHASE 2','hi');
  render();
}

function endTurnFromMain2(){
  phase='end';

function afterForcedDiscard(){
  const p=G.players[0];
  const combined=p.hand.length+(p.mysticHand||[]).length;
  if(combined<=HAND_COMBINED_MAX){
    onPlayerDrawDone();
  } else {
    render();
  }
}

function doForcedDiscardSeal(idx){
  if(phase!=='discard')return;
  const p=G.players[0];
  if(p.hand.length+(p.mysticHand||[]).length<=HAND_COMBINED_MAX)return;
  const card=p.hand.splice(idx,1)[0];
  p.shrine.push(card);
  log(`ทิ้ง ${card.name} → Shrine (Discard Step)`,'bad');
  checkLose();
  afterForcedDiscard();
}

function doForcedDiscardMystic(idx){
  if(phase!=='discard')return;
  const p=G.players[0];
  if(p.hand.length+(p.mysticHand||[]).length<=HAND_COMBINED_MAX)return;
  const card=p.mysticHand.splice(idx,1)[0];
  log(`ทิ้ง ${card.name} (Mystic) — Discard Step`,'bad');
  afterForcedDiscard();
}

function tickCurses(){
  // Heaven Knight (82): while on field, cancel all curses on all seals
  const heavenKnightActive=[0,1].some(pi=>[...G.players[pi].atLine,...G.players[pi].dfLine].some(x=>x.card.id===82));
  if(heavenKnightActive){
    [0,1].forEach(pi=>{
      [...G.players[pi].atLine,...G.players[pi].dfLine].forEach(fc=>{
        if(fc.curses?.length){
          fc.curses=[];
          fc.charmed=null;
          log(`${fc.card.name}: Heaven Knight ยกเลิก Curse!`,'');
        }
      });
    });
  }
  let needCheck=false;
  [0,1].forEach(pi=>{
    ['atLine','dfLine'].forEach(lineKey=>{
      const arr=G.players[pi][lineKey];
      for(let i=arr.length-1;i>=0;i--){
        const fc=arr[i];
        if(!fc.curses?.length)continue;
        const expired=fc.curses.filter(c=>subTurnNum>=c.expiresAtSubTurn);
        fc.curses=fc.curses.filter(c=>subTurnNum<c.expiresAtSubTurn);
        if(!expired.length)continue;
        // Poison / LastDance → destroy
        if(expired.some(c=>c.type==='poison'||c.type==='lastDance')){
          arr.splice(i,1);
          if(fc.fusionStack?.length)fc.fusionStack.forEach(m=>G.players[pi].shrine.push(m.card));
          G.players[pi].shrine.push(fc.card);
          const cname=expired.find(c=>c.type==='lastDance')?'Last Dance Curse':'Poison Curse';
          log(`☠ ${fc.card.name} ถูกทำลายจาก ${cname}!`,'bad');
          needCheck=true;
        }
        // Charm → just release control, card stays in place
        if(expired.some(c=>c.type==='charm')&&fc.charmed){
          fc.charmed=null;
          log(`${fc.card.name} หายจาก Charm Curse — กลับสู่เจ้าของเดิม`,'');
        }
        // Stone / Freeze → just expire (no destroy, no move)
      }
    });
  });
  if(needCheck)checkLose();
}

function endTurn(){
  const prevPi=G.currentPlayer;
  G.players[prevPi].atLine.forEach(s=>{s.activeMultiAtk=null;s.hitsLeft=0;});
  G.players[prevPi].dfLine.forEach(s=>{s.activeMultiAtk=null;s.hitsLeft=0;});
  handAttackedThisTurn=false;
  G.currentPlayer=G.currentPlayer===0?1:0;
  const pi=G.currentPlayer;
  subTurnNum++;
  G.players[pi].atLine.forEach(s=>{s.exhausted=false;s.hasUsedSkill=false;s.willMind=false;s.atBoosts=s.atBoosts.filter(b=>subTurnNum<b.expiresBeforeSubTurn);s.spBoosts=(s.spBoosts||[]).filter(b=>subTurnNum<b.expiresBeforeSubTurn);s.dfBoosts=(s.dfBoosts||[]).filter(b=>subTurnNum<b.expiresBeforeSubTurn);});
  G.players[pi].dfLine.forEach(s=>{s.exhausted=false;s.hasUsedSkill=false;s.willMind=false;s.atBoosts=s.atBoosts.filter(b=>subTurnNum<b.expiresBeforeSubTurn);s.spBoosts=(s.spBoosts||[]).filter(b=>subTurnNum<b.expiresBeforeSubTurn);s.dfBoosts=(s.dfBoosts||[]).filter(b=>subTurnNum<b.expiresBeforeSubTurn);});
  tickCurses();
  tickMystics();
  if(pi===0){
    // Player's turn: draw choice modal (from endAITurn, not called here normally)
    drawCard(pi);
    drawMysticCard(pi);
    G.players[pi].mp=MAX_MP;
    turnNum++;
    phase='draw';
    log(`Turn ${turnNum} — Player's turn | DRAW PHASE`,'hi');
    setTimeout(()=>{phase='main';log('MAIN PHASE','hi');render();},400);
    render();
  } else {
    // AI's turn: draw 2 (seal/mystic randomly), show card backs
    G.players[pi].mp=MAX_MP;
    phase='main';
    log(`AI's turn`,'hi');
    render();
    aiDrawCards(pi,()=>{
      render();
      setTimeout(()=>aiTurn(),400);
    });
  }
}

function getActiveMystics(fc){
  return (fc.mystics||[]).filter(m=>m.expiresBeforeSubTurn===Infinity||subTurnNum<m.expiresBeforeSubTurn);
}
function _mysticOwnerPi(fc){
  for(let pi=0;pi<2;pi++){if([...G.players[pi].atLine,...G.players[pi].dfLine].some(x=>x.uid===fc.uid))return pi;}
  return -1;
}
function _gregoryNegates(fc){
  const pi=_mysticOwnerPi(fc);
  return pi>=0&&G.players[pi].atLine.some(x=>x.card.id===67);
}
function getMysticAtBonus(fc){
  if(_gregoryNegates(fc))return 0;
  return getActiveMystics(fc).reduce((s,m)=>{
    let b=m.atBonus||0;
    if(fc.card.id===4&&m.mystic?.subtype_name==='The Moon')b*=2;
    return s+b;
  },0);
}
function getMysticDfBonus(fc){
  if(_gregoryNegates(fc))return 0;
  return getActiveMystics(fc).reduce((s,m)=>{
    let b=m.dfBonus||0;
    if(fc.card.id===4&&m.mystic?.subtype_name==='The Moon')b*=2;
    return s+b;
  },0);
}
function getMysticSpBonus(fc){
  if(_gregoryNegates(fc))return 0;
  return getActiveMystics(fc).reduce((s,m)=>{
    let b=m.spBonus||0;
    if(fc.card.id===4&&m.mystic?.subtype_name==='The Moon')b*=2;
    return s+b;
  },0);
}
function hasMysticProtect(fc){
  if(_gregoryNegates(fc))return false;
  return getActiveMystics(fc).some(m=>m.protects);
}
function hasMysticDoubleAtk(fc){
  if(_gregoryNegates(fc))return false;
  return getActiveMystics(fc).some(m=>m.doubleAtk);
}

function canAttachMystic(mysticCard,targetFC){
  if(mysticCard.exception_lv!=null&&targetFC.card.lv>=mysticCard.exception_lv)return false;
  if(mysticCard.exception_tribes?.length&&mysticCard.exception_tribes.includes(targetFC.card.tribe))return false;
  if(mysticCard.exception_els?.length&&mysticCard.exception_els.includes(targetFC.card.el))return false;
  return true;
}

function findFCOwner(fc){
  for(let pi=0;pi<2;pi++){
    const p=G.players[pi];
    if([...p.atLine,...p.dfLine].some(x=>x.uid===fc.uid))return{p,pi};
  }
  return null;
}

function showMysticPicker(title,opts,onPick){
  document.getElementById('fa-title').textContent=title;
  const div=document.getElementById('fa-opts');
  div.innerHTML='';
  opts.forEach(({label,data})=>{
    const btn=document.createElement('button');
    btn.className='fopt';
    btn.textContent=label;
    btn.onclick=()=>{closeFAModal();onPick(data);};
    div.appendChild(btn);
  });
  const cancel=document.createElement('button');

function getEffectiveMc(card){
  let mc=card.mc;
  const p=G.players[0];
  // Albino Gryption (75): own Beasts in hand cost mc -1
  if(card.tribe==='Beast'&&[...p.atLine,...p.dfLine].some(x=>x.card.id===75))mc=Math.max(0,mc-1);
  return mc;
}

function clickHandCard(card,idx){
  if(G.currentPlayer!==0)return;
  if(phase!=='main'&&phase!=='main2'){log('Can only deploy during Main Phase','');return;}
  if(handPickMode){executeHandPickBeast(card,idx);return;}
  const mc=getEffectiveMc(card);
  if(G.players[0].mp<mc){log(`Not enough Mp (need ${mc}, have ${G.players[0].mp})`,'bad');return;}
  pendingDeploy={card,idx};
  const mcNote=mc!==card.mc?` (${card.mc}→${mc})`:'';
  document.getElementById('deploy-title').textContent=`Deploy ${card.name} (Mp ${mc}${mcNote})`;
  document.getElementById('deploy-modal').classList.add('show');
}

function doDeploy(line){
  if(!pendingDeploy)return;
  const {card,idx}=pendingDeploy;
  if((phase!=='main'&&phase!=='main2')||G.currentPlayer!==0){log('Deploy ได้เฉพาะ Main Phase ของผู้เล่น','bad');closeDeployModal();return;}
  const mc=getEffectiveMc(card);
  if(G.players[0].mp<mc){log(`Mp ไม่พอ (ต้องการ ${mc})`,'bad');closeDeployModal();return;}
  const p=G.players[0];
  // Dread Knight (63): must always be in At Line
  if(card.id===63){
    if(p.atLine.length>=LINE_MAX){log('At Line เต็ม — Dread Knight ต้องอยู่ใน At Line!','bad');closeDeployModal();return;}
    line='at';
  }
  const target=line==='at'?p.atLine:p.dfLine;
  p.hand.splice(idx,1);
  p.mp-=mc;
  target.push(makeFieldCard(card,true));
  log(`You deployed ${card.name} to ${line==='at'?'At':'Df'} Line`,'good');
  closeDeployModal();
  // Dark Destiny (72): on deploy, optionally take 1 mystic from mystic deck
  if(card.id===72&&(p.mysticDeck||[]).length>0){
    document.getElementById('fa-title').textContent='Dark Destiny [Ability]: หยิบ Mystic จากกองการ์ด?';
    const opts=document.getElementById('fa-opts');opts.innerHTML='';
    addFAOpt('✅ หยิบ Mystic 1 ใบ',()=>{
      closeFAModal();
      drawMysticCard(0,false,true);
      log(`Dark Destiny [Ability]: จั่ว Mystic 1 ใบ!`,'good');
      render();
    });
    addFAOpt('✗ ไม่ต้องการ',()=>{closeFAModal();render();});
    document.getElementById('fa-modal').classList.add('show');
    return;
  }
  render();
}

function closeDeployModal(){
  pendingDeploy=null;
  document.getElementById('deploy-modal').classList.remove('show');
}

// FIELD ACTION (line switch, fusion)
// ══════════════════════════════════════════════
function showFieldAction(fc,line){
  fieldActionTarget={fc,line};
  document.getElementById('fa-title').textContent=fc.card.name;
  const opts=document.getElementById('fa-opts');
  opts.innerHTML='';

  // View card
  addFAOpt('👁 View Card',()=>{closeFAModal();openCardViewer(fc.card,fc);});

  // Stone Curse: no actions allowed except viewing
  if(fc.curses?.some(c=>c.type==='stone')){
    const lbl=addFAOpt('🪨 Stone Curse — สั่งการไม่ได้',()=>{});
    lbl.disabled=true;
    document.getElementById('fa-modal').classList.add('show');
    return;
  }

  // Line switch: not exhausted AND deployed before this turn
  const p=G.players[0];
  const canSwitch=!fc.exhausted && fc.deployedTurn<turnNum && fc.lineSwitchedTurn<turnNum;
  const otherLine=line==='at'?'df':'at';
  const otherArr=otherLine==='at'?p.atLine:p.dfLine;
  const switchBtn=addFAOpt(`⟷ Move to ${otherLine==='at'?'At':'Df'} Line`,()=>{doLineSwitch(fc,line,otherLine);});
  if(!canSwitch)switchBtn.disabled=true;

  const isCharmedCard=!!fc.charmed;

  // Fuse: has fuse data and still has materials to absorb (skip for charmed enemy cards)
  if(!isCharmedCard&&fc.card.fuse&&fc.card.fuse.length>0){
    const materials=findFusionMaterials(fc);
    const fuseBtn=addFAOpt('⚡ Fuse',()=>{closeFAModal();startFusionMode(fc);});
    if(!materials.length)fuseBtn.disabled=true;
  }

  // Unfuse: is fused, fused on previous turn (skip for charmed enemy cards)
  if(!isCharmedCard&&fc.fused&&fc.fusedSinceTurn<turnNum){
    addFAOpt('↩ Unfuse',()=>{doUnfuse(fc);closeFAModal();});
  }

  // Skills
  const skills=getCardSkills(fc);
  skills.forEach((skill,idx)=>{
    const canUse=!fc.hasUsedSkill&&p.mp>=skill.mp&&(skill.type!=='handDiscard'||p.hand.length>0);
    const btn=addFAOpt(skill.label,()=>{
      closeFAModal();
      if(skill.type==='handDiscard')startInterfereSkill(fc,idx);
      else if(skill.type==='selfSkill')executeSelfSkill(fc,idx);
      else if(skill.type==='handPickBeast'){handPickMode={fc,skillIdx:idx};log(`${fc.card.name} [Skill] — เลือก [Beast] ในมือเพื่อนำลงสนาม`,'hi');render();}
      else if(skill.type==='garudaInterfere'){log(`${fc.card.name} [Interfere] ใช้ได้เฉพาะในช่วง Action Queue`,'bad');}
      else if(skill.type==='phoenixInterfere'){log(`Phoenix [Interfere] ฟื้นจาก Shrine ได้ในช่วง Action Queue`,'bad');}
      else startSkillMode(fc,idx);
    });
    if(!canUse)btn.disabled=true;
  });

  document.getElementById('fa-modal').classList.add('show');
}

function addFAOpt(label,fn){
  const btn=document.createElement('button');
  btn.className='fopt';
  btn.textContent=label;
  btn.onclick=fn;
  document.getElementById('fa-opts').appendChild(btn);
  return btn;
}

function closeFAModal(){
  document.getElementById('fa-modal').classList.remove('show');
  fieldActionTarget=null;
}

function doLineSwitch(fc,fromLine,toLine){
  if(phase!=='main'&&phase!=='main2'){log('เปลี่ยน line ได้เฉพาะ Main Phase','bad');closeFAModal();return;}
  if(fc.exhausted){log(`${fc.card.name} inactive ไม่สามารถเปลี่ยน line ได้`,'bad');closeFAModal();return;}
  if(fc.deployedTurn>=turnNum){log(`${fc.card.name} ลงในเทิร์นนี้ ยังเปลี่ยน line ไม่ได้`,'bad');closeFAModal();return;}
  if(fc.lineSwitchedTurn>=turnNum){log(`${fc.card.name} เปลี่ยน line ไปแล้วในเทิร์นนี้`,'bad');closeFAModal();return;}
  if(fc.card.id===63&&toLine==='df'){log('Dread Knight ต้องอยู่ใน At Line เสมอ!','bad');closeFAModal();return;}
  const owner=findFCOwner(fc);
  const p=owner?owner.p:G.players[0];
  const fromArr=fromLine==='at'?p.atLine:p.dfLine;
  const toArr=toLine==='at'?p.atLine:p.dfLine;
  const i=fromArr.findIndex(x=>x.uid===fc.uid);
  if(i>=0)fromArr.splice(i,1);
  toArr.push(fc);
  fc.lineSwitchedTurn=turnNum;
  log(`${fc.card.name} moved to ${toLine==='at'?'At':'Df'} Line`,'good');
  closeFAModal();
  render();
}

// ── FUSION ──
function matchesFuseReq(f,card){
  if(f.rt==='el')return f.req==='any'||f.req===card.el;
  if(f.rt==='tribe')return f.req===card.tribe;
  if(f.rt==='card')return f.req===card.name;
  return false;
}

function getUnlockedAtks(mainFC){
  const fuse=mainFC.card.fuse||[];
  const groups={};
  fuse.forEach(f=>{const key=f.rt+':'+f.req;if(!groups[key])groups[key]=[];groups[key].push(f);});
  const result=[];
  for(const key of Object.keys(groups)){
    const sorted=groups[key].slice().sort((a,b)=>b.cnt-a.cnt);
    for(const f of sorted){
      const have=mainFC.fusionStack.filter(m=>matchesFuseReq(f,m.card)).length;
      if(have>=f.cnt){result.push({...f.atk});break;}
    }
  }
  return result;
}

function fuseMaterialHelps(mainFC,card){
  const fuse=mainFC.card.fuse||[];
  const stack=mainFC.fusionStack;
  // After first material is added, lock to the same fusion group (same req+rt)
  let lockedKey=null;
  if(stack.length>0){
    const first=stack[0].card;
    for(const f of fuse){if(matchesFuseReq(f,first)){lockedKey=f.rt+':'+f.req;break;}}
  }
  return fuse.some(f=>{
    if(lockedKey&&(f.rt+':'+f.req)!==lockedKey)return false;
    const have=stack.filter(s=>matchesFuseReq(f,s.card)).length;
    return have<f.cnt&&matchesFuseReq(f,card);
  });
}

// Rule 613.8.3: card deployed from hand this turn cannot be Support Seal
function newFromHand(m){return m.fromHand && m.deployedTurn >= turnNum;}

function findFusionMaterials(mainFC){
  const p=G.players[0];
  const all=[...p.atLine,...p.dfLine];
  return all.filter(m=>{
    if(m.uid===mainFC.uid||m.fused||newFromHand(m))return false;
    return fuseMaterialHelps(mainFC,m.card);
  });
}

function canBeFusionMaterial(fc){
  if(!fusionMode||!fusionMainFC)return false;
  if(fc.uid===fusionMainFC.uid||fc.fused||newFromHand(fc))return false;
  return fuseMaterialHelps(fusionMainFC,fc.card);
}

function startFusionMode(fc){
  fusionMode=true;
  fusionMainFC=fc;
  log(`Select material card to fuse with ${fc.card.name}...`,'hi');
  render();
}

function doFuse(mainFC,materialFC){
  if(!fuseMaterialHelps(mainFC,materialFC.card)){log('การ์ดนี้ไม่ตรง requirement','bad');return;}
  const p=G.players[0];
  const removeFrom=arr=>{const i=arr.findIndex(x=>x.uid===materialFC.uid);if(i>=0)arr.splice(i,1);};
  removeFrom(p.atLine);removeFrom(p.dfLine);
  mainFC.fusionStack.push(materialFC);
  mainFC.fusionAtks=getUnlockedAtks(mainFC);
  mainFC.fused=true;
  if(!mainFC.fusedSinceTurn)mainFC.fusedSinceTurn=turnNum;
  const atkNames=mainFC.fusionAtks.map(a=>a.name).join(', ')||'(กำลังสะสม...)';
  log(`+${materialFC.card.name} → ${mainFC.card.name}: ${atkNames}`,'good');
  // Keep fusion mode active if more materials can still be added
  const moreMats=findFusionMaterials(mainFC);
  if(moreMats.length>0){
    log(`เลือกการ์ดต่อ หรือกด Cancel เพื่อหยุด`,'hi');
    render();
  } else {
    cancelFusion();
  }
}

function doUnfuse(fc){
  const p=G.players[0];
  fc.fusionStack.forEach(mfc=>{
    if(p.atLine.length<LINE_MAX)p.atLine.push(mfc);
    else if(p.dfLine.length<LINE_MAX)p.dfLine.push(mfc);
    else p.shrine.push(mfc.card);
  });
  fc.fusionStack=[];
  fc.fusionAtks=[];
  fc.fused=false;
  fc.fusedSinceTurn=null;
  log(`${fc.card.name} unfused`,'');
  render();
}

function cancelFusion(){
  fusionMode=false;
  fusionMainFC=null;
  render();
}

  // ── Regina Princess Swords (id=94): all own seals move to At Line, fused+wind+At Line, Mp 1 ──
  if(fc.card.id===94){
    const fusedWithWind=(fc.fused&&fc.fusionStack.some(m=>m.card.el==='wind'))||fc.willMind;
    if(fusedWithWind&&isOnAtLine(fc)){
      return [{label:'✦ [Skill] Seal ทุกใบย้ายไป At Line (Mp 1)',mp:1,type:'selfSkill',effect:'allToAtLine'}];
    }
    return[];
  }
  // ── Wanaan Princess Pentacles (id=95): Interfere Df boost = mc, 1 subturn, Mp 2 ──
  if(fc.card.id===95){
    return [{
      label:'✦ [Skill/Interfere] Seal ใบใด +Df ตาม Mp ค่าร่ายจนจบ Subturn (Mp 2)',
      mp:2, type:'fieldTarget', effect:'dfBoostMc', interfere:false,
      filter:t=>[...G.players[0].atLine,...G.players[0].dfLine].some(x=>x.uid===t.uid)
    }];
  }
  // ── Blaze Sage (id=74): Sacrifice own seal → another own seal +At=mc for 1 turn, Mp 2 ──
  if(fc.card.id===74){
    const p=G.players[0];
    const ownField=[...p.atLine,...p.dfLine];
    if(ownField.length>=2){
      return [{
        label:'✦ [Skill] Sacrifice Seal → Seal อื่น +At ตาม Mc 1 Turn (Mp 2)',
        mp:2, type:'fieldTarget', effect:'sacrificeStep1',
        filter:t=>[...G.players[0].atLine,...G.players[0].dfLine].some(x=>x.uid===t.uid)&&t.uid!==fc.uid
      }];
    }
    return[];
  }
  // ── Wool Wyvern (id=80): Interfere deploy from hand, Mp 4 ──
  if(fc.card.id===80){
    return [{label:'✦ [Skill/Interfere] ลง Wool Wyvern จากมือ (Mp 4)',mp:4,type:'garudaInterfere',interfere:false}];
  }
  // ── Phoenix (id=78): Interfere deploy from shrine (one-time), Mp 2 ──
  if(fc.card.id===78){
    return [{label:'✦ [Skill/Interfere] ลง Phoenix จาก Shrine (Mp 2)',mp:2,type:'phoenixInterfere',interfere:false}];
  }
  if(fc.card.id===3){
    const skills=[{
      label:'✦ [Skill] ส่ง [Dark] ในสนามคืนกอง (Mp 2)',
      mp:2, type:'fieldTarget',
      filter:t=>t.card.el==='darkness'
    }];
    if(fc.fused){
      skills.push({
        label:'✦ [Skill+] ส่ง [Dark]/[Evil] ในสนามคืนกอง (Mp 2)',
        mp:2, type:'fieldTarget',
        filter:t=>t.card.el==='darkness'||t.card.tribe==='Evil'
      });
    }
    return skills;
  }
  if(fc.card.id===85){
    return [{
      label:'✦ [Skill/Interfere] ทิ้ง Seal ในมือ → Tiamat +At 1 Turn (Mp 2)',
      mp:2, type:'handDiscard', interfere:true
    }];
  }
  // ── Angel of Sword (id=20): opponent discards random mystic — fused+AtLine, Mp 3 ──
  if(fc.card.id===20){
    if((fc.fused||fc.willMind)&&isOnAtLine(fc)&&(G.players[1].mysticHand||[]).length>0){
      return [{label:'✦ [Skill] ฝ่ายตรงข้ามทิ้ง Mystic แบบสุ่ม (Mp 3)',mp:3,type:'selfSkill',effect:'discardRandomMystic'}];
    }
    return[];
  }
  // ── Titania (id=54): destroy 1 mystic on field — fused+Light, Mp 2 ──
  if(fc.card.id===54){
    const fusedWithLight=(fc.fused&&fc.fusionStack.some(m=>m.card.el==='light'))||fc.willMind;
    if(fusedWithLight){
      const allField=[...G.players[0].atLine,...G.players[0].dfLine,...G.players[1].atLine,...G.players[1].dfLine];
      if(allField.some(t=>getActiveMystics(t).length>0)){
        return [{
          label:'✦ [Skill] ทำลาย Mystic Card 1 ใบในสนาม (Mp 2)',
          mp:2, type:'fieldTarget', effect:'destroyOneMystic',
          filter:t=>getActiveMystics(t).length>0
        }];
      }
    }
    return[];
  }
  // ── Sphinx (id=65): mass reset — all seals to deck, redeploy from hand — fused+Light+AtLine, Mp 4 ──
  if(fc.card.id===65){
    const fusedWithLight=(fc.fused&&fc.fusionStack.some(m=>m.card.el==='light'))||fc.willMind;
    if(fusedWithLight&&isOnAtLine(fc)){
      return [{label:'✦ [Skill] Reset สนาม — Seal ทุกใบกลับกอง จากนั้นทุกคนวางจากมือ (Mp 4)',mp:4,type:'selfSkill',effect:'massReset'}];
    }
    return[];
  }
  return[];
}

function isSkillTarget(fc){
  if(!skillMode)return false;
  if(fc.uid===skillMode.fc.uid)return false;
  if(skillMode.skillIdx===-99){
    // Blaze Sage step 2: any own seal (excluding the skill caster which was already removed)
    return pendingSacrifice&&[...G.players[0].atLine,...G.players[0].dfLine].some(x=>x.uid===fc.uid);
  }
  const skills=getCardSkills(skillMode.fc);
  const skill=skills[skillMode.skillIdx];
  if(!skill)return false;
  return skill.filter(fc);
}

function startSkillMode(fc,skillIdx){
  skillMode={fc,skillIdx};
  log(`${fc.card.name} — เลือกเป้าหมายสกิล (คลิก ${getCardSkills(fc)[skillIdx]?.label||'Skill'})`,'hi');
  render();
}

function getInterfereSkills(){
  const p=G.players[0];
  return [...p.atLine,...p.dfLine].flatMap(fc=>{
    if(fc.hasUsedSkill)return[];
    return getCardSkills(fc)
      .map((skill,idx)=>({fc,skillIdx:idx,skill}))
      .filter(({skill})=>skill.interfere&&p.mp>=skill.mp&&p.hand.length>0);
  });
}

function cancelHandDiscard(){
  handDiscardMode=null;
  handPickMode=null;
  render();
}

function executeHandPickBeast(card,idx){
  if(!handPickMode)return;
  const {fc,skillIdx}=handPickMode;
  const p=G.players[0];
  const skill=getCardSkills(fc)[skillIdx];
  if(!skill||p.mp<skill.mp){log('Mp ไม่พอ','bad');handPickMode=null;render();return;}
  if(card.tribe!=='Beast'){log('ต้องเลือก [Beast] เท่านั้น','bad');return;}
  const target=p.atLine.length<LINE_MAX?p.atLine:p.dfLine;
  if(target.length>=LINE_MAX){log('สนามเต็ม!','bad');handPickMode=null;render();return;}
  showActionQueue(`${fc.card.name} [Skill] → นำ <b>${card.name}</b> ลงสนาม`,()=>{
    p.mp-=skill.mp;fc.hasUsedSkill=true;
    p.hand.splice(idx,1);
    target.push(makeFieldCard(card,true));
    log(`${fc.card.name} [Skill]: ${card.name} ลงสนามจากมือ!`,'good');
    handPickMode=null;checkLose();render();
  });
}

function openInterferePicker(){
  const opts=getInterfereSkills();
  if(!opts.length)return;
  // For now: auto-pick first (future: show picker when multiple)
  startInterfereSkill(opts[0].fc,opts[0].skillIdx);
}

function startInterfereSkill(fc,skillIdx){
  handDiscardMode={fc,skillIdx};
  log(`${fc.card.name} [Interfere] — เลือก Seal ในมือเพื่อทิ้ง`,'hi');
  render();
}

function executeInterfere(card){
  if(!handDiscardMode)return;
  const {fc,skillIdx}=handDiscardMode;
  const p=G.players[0];
  const skill=getCardSkills(fc)[skillIdx];
  if(!skill||p.mp<skill.mp){log('Mp ไม่พอ','bad');handDiscardMode=null;render();return;}
  p.mp-=skill.mp;
  fc.hasUsedSkill=true;
  const hi=p.hand.indexOf(card);
  if(hi>=0)p.hand.splice(hi,1);
  p.shrine.push(card);
  fc.atBoosts=(fc.atBoosts||[]);
  fc.atBoosts.push({amount:card.lv, expiresBeforeSubTurn: subTurnNum+2});
  log(`${fc.card.name} [Interfere]: ทิ้ง ${card.name} (Lv${card.lv}) → At +${card.lv} turn นี้!`,'good');
  handDiscardMode=null;
  checkLose();render();
}

function executeSelfSkill(skillFC,skillIdx){
  const p=G.players[0];
  const skill=getCardSkills(skillFC)[skillIdx];
  if(!skill||p.mp<skill.mp){log('Mp ไม่พอ','bad');return;}
  if(skill.effect==='drawCard'){
    showActionQueue(`${skillFC.card.name} [Skill] จั่วการ์ด 1 ใบ`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      if(p.deck.length){p.hand.push(p.deck.pop());log(`${skillFC.card.name} [Skill]: จั่วการ์ด 1 ใบ!`,'good');}
      else log(`${skillFC.card.name} [Skill]: ไม่มีการ์ดในกอง`,'bad');
      checkLose();render();
    });
    return;
  }
  if(skill.effect==='returnSelfToDeck'){
    showActionQueue(`${skillFC.card.name} [Skill] คืนตัวเองสู่กอง + สลับ`,()=>{
      p.mp-=skill.mp;
      skillFC.hasUsedSkill=true;
      // Return support seals to field
      skillFC.fusionStack.forEach(mfc=>{
        if(p.atLine.length<LINE_MAX)p.atLine.push(mfc);
        else if(p.dfLine.length<LINE_MAX)p.dfLine.push(mfc);
        else p.shrine.push(mfc.card);
      });
      // Remove Ghost Ship from field
      const rmA=p.atLine.findIndex(x=>x.uid===skillFC.uid);
      if(rmA>=0)p.atLine.splice(rmA,1);
      const rmD=p.dfLine.findIndex(x=>x.uid===skillFC.uid);
      if(rmD>=0)p.dfLine.splice(rmD,1);
      p.deck.push(skillFC.card);
      shuffle(p.deck);
      log(`${skillFC.card.name} [Skill]: กลับสู่กองและสลับแล้ว!`,'good');
      checkLose();render();
    });
    return;
  }
  if(skill.effect==='freezeAll'){
    showActionQueue(`${skillFC.card.name} [Skill] Freeze Curse ศัตรูทุกตัว 1 Turn`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      const ai=G.players[1];
      const allEnemy=[...ai.atLine,...ai.dfLine];
      allEnemy.forEach(t=>{
        t.curses=(t.curses||[]);
        if(!t.curses.some(c=>c.type==='freeze'))t.curses.push({type:'freeze',expiresAtSubTurn:subTurnNum+2});
      });
      // Move frozen At Line seals to Df Line
      [...ai.atLine].forEach(t=>{
        const i=ai.atLine.findIndex(x=>x.uid===t.uid);
        if(i>=0&&ai.dfLine.length<LINE_MAX){ai.atLine.splice(i,1);ai.dfLine.push(t);}
      });
      log(`${skillFC.card.name} [Skill]: ศัตรูทุกตัว (${allEnemy.length}) ติด Freeze Curse 1 Turn!`,'good');
      checkLose();render();
    });
    return;
  }
  if(skill.effect==='shrineToHand'){
    if(!p.shrine.length){log('Shrine ว่างเปล่า','bad');return;}
    // Show shrine picker via fa-modal
    document.getElementById('fa-title').textContent=`${skillFC.card.name}: เลือกจาก Shrine`;
    const opts=document.getElementById('fa-opts');opts.innerHTML='';
    p.shrine.forEach((card,i)=>{
      addFAOpt(`${card.name} (Lv${card.lv} At${card.at})`,()=>{
        closeFAModal();
        showActionQueue(`${skillFC.card.name} [Skill] → <b>${card.name}</b> จาก Shrine ขึ้นมือ`,()=>{
          p.mp-=skill.mp;skillFC.hasUsedSkill=true;
          if(p.hand.length>=HAND_MAX){log('มือเต็ม!','bad');return;}
          const si=p.shrine.indexOf(card);
          if(si>=0)p.shrine.splice(si,1);
          p.hand.push(card);
          log(`${skillFC.card.name} [Skill]: ${card.name} จาก Shrine ขึ้นมือ!`,'good');
          checkLose();render();
        });
      });
    });
    document.getElementById('fa-modal').classList.add('show');
    return;
  }
  if(skill.effect==='allToAtLine'){
    showActionQueue(`${skillFC.card.name} [Skill] Seal ทุกใบย้ายไป At Line`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      const toMove=[...p.dfLine];
      p.dfLine.length=0;
      toMove.forEach(fc=>{if(p.atLine.length<LINE_MAX)p.atLine.push(fc);else p.dfLine.push(fc);});
      log(`${skillFC.card.name} [Skill]: Seal ทุกใบย้ายไป At Line!`,'good');
      checkLose();render();
    });
    return;
  }
  if(skill.effect==='discardRandomMystic'){
    showActionQueue(`${skillFC.card.name} [Skill] ฝ่ายตรงข้ามทิ้ง Mystic แบบสุ่ม`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      const ai=G.players[1];
      if((ai.mysticHand||[]).length>0){
        const idx=Math.floor(Math.random()*ai.mysticHand.length);
        const card=ai.mysticHand.splice(idx,1)[0];
        log(`${skillFC.card.name} [Skill]: AI ทิ้ง Mystic ${card.name} แบบสุ่ม!`,'good');
      } else {
        log(`${skillFC.card.name} [Skill]: AI ไม่มี Mystic ในมือ`,'bad');
      }
      checkLose();render();
    });
    return;
  }
  if(skill.effect==='massReset'){
    showActionQueue(`${skillFC.card.name} [Skill] Reset สนาม — Seal ทุกใบกลับกองและทุกคนวางจากมือ`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      // Step 1: All field seals (+ their mystics/fusions) return to owners' decks
      for(let pi=0;pi<2;pi++){
        const owner=G.players[pi];
        const allFC=[...owner.atLine,...owner.dfLine];
        owner.atLine=[];owner.dfLine=[];
        allFC.forEach(fc=>{
          fc.mystics=[];
          if(fc.fusionStack?.length)fc.fusionStack.forEach(m=>owner.deck.push(m.card));
          owner.deck.push(fc.card);
        });
        shuffle(owner.deck);
      }
      // Step 2: All players deploy all hand seals to field for free
      for(let pi=0;pi<2;pi++){
        const owner=G.players[pi];
        const toPlay=[...owner.hand];
        owner.hand=[];
        toPlay.forEach(card=>{
          if(owner.atLine.length<LINE_MAX)owner.atLine.push(makeFieldCard(card,true));
          else if(owner.dfLine.length<LINE_MAX)owner.dfLine.push(makeFieldCard(card,true));
          else owner.hand.push(card);
        });
      }
      log(`${skillFC.card.name} [Skill]: Reset สนาม! Seal ทุกใบกลับกองและวางใหม่จากมือ!`,'good');
      checkLose();render();
    });
    return;
  }
}

function executeSkill(skillFC,skillIdx,targetFC,targetPi,targetLine){
  // Blaze Sage step 2: apply At boost to the chosen boost target
  if(skillIdx===-99&&pendingSacrifice){
    const {skillFC:blazeFC,mc}=pendingSacrifice;
    targetFC.atBoosts=(targetFC.atBoosts||[]);
    targetFC.atBoosts.push({amount:mc,expiresBeforeSubTurn:subTurnNum+2});
    log(`${blazeFC.card.name} [Skill]: ${targetFC.card.name} +At${mc} (1 Turn)!`,'good');
    pendingSacrifice=null;skillMode=null;render();
    return;
  }
  const p=G.players[0];
  const skills=getCardSkills(skillFC);
  const skill=skills[skillIdx];
  if(!skill)return;
  if(p.mp<skill.mp){log('Mp ไม่พอ','bad');skillMode=null;render();return;}
  skillMode=null;

  if(skill.effect==='healCurse'){
    showActionQueue(`${skillFC.card.name} [Skill] → รักษา Curse <b>${targetFC.card.name}</b>`,()=>{
      p.mp-=skill.mp;
      skillFC.hasUsedSkill=true;
      targetFC.curses=[];
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} หาย Curse ทุกชนิด!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='destroyTarget'){
    showActionQueue(`${skillFC.card.name} [Skill] → ทำลาย <b>${targetFC.card.name}</b>`,()=>{
      p.mp-=skill.mp;
      skillFC.hasUsedSkill=true;
      sendToShrine(targetFC,targetPi);
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} ถูกทำลาย!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='deathCurse'){
    showActionQueue(`${skillFC.card.name} [Skill] → ☠ Death Curse <b>${targetFC.card.name}</b>`,()=>{
      p.mp-=skill.mp;
      skillFC.hasUsedSkill=true;
      sendToShrine(targetFC,targetPi);
      log(`${skillFC.card.name} [Skill]: ☠ Death Curse → ${targetFC.card.name} ถูกทำลายทันที!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='poisonCurse'){
    const turns=skill.turns||3;
    showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> ติด ☠Poison Curse ${turns} Turn`,()=>{
      p.mp-=skill.mp;
      skillFC.hasUsedSkill=true;
      targetFC.curses=(targetFC.curses||[]);
      targetFC.curses.push({type:'poison',expiresAtSubTurn:subTurnNum+(turns*2)});
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} ติด Poison Curse ${turns} Turn!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='stoneCurse'){
    const turns=skill.turns||1;
    showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> ติด 🪨Stone Curse ${turns} Turn`,()=>{
      p.mp-=skill.mp;
      skillFC.hasUsedSkill=true;
      targetFC.curses=(targetFC.curses||[]);
      targetFC.curses.push({type:'stone',expiresAtSubTurn:subTurnNum+(turns*2)});
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} ติด Stone Curse ${turns} Turn — สั่งการไม่ได้!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='freezeCurse'){
    const turns=skill.turns||1;
    showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> ติด ❄Freeze Curse ${turns} Turn`,()=>{
      p.mp-=skill.mp;
      skillFC.hasUsedSkill=true;
      targetFC.curses=(targetFC.curses||[]);
      targetFC.curses.push({type:'freeze',expiresAtSubTurn:subTurnNum+(turns*2)});
      // Force to Df Line
      const owner=G.players[targetPi];
      if(targetLine==='at'){
        const i=owner.atLine.findIndex(x=>x.uid===targetFC.uid);
        if(i>=0){owner.atLine.splice(i,1);if(owner.dfLine.length<LINE_MAX)owner.dfLine.push(targetFC);}
      }
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} ติด Freeze Curse ${turns} Turn — ถูกย้ายไป Df Line!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='lastDanceCurse'){
    const turns=skill.turns||2;
    const atBonus=skill.atBonus||0;
    showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> Last Dance Curse At+${atBonus} / ${turns} Turn`,()=>{
      p.mp-=skill.mp;
      skillFC.hasUsedSkill=true;
      targetFC.curses=(targetFC.curses||[]);
      targetFC.curses.push({type:'lastDance',atBonus,expiresAtSubTurn:subTurnNum+(turns*2)});
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} Last Dance Curse — At+${atBonus} แล้วถูกทำลายใน ${turns} Turn!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='charmCurse'){
    const turns=skill.turns||3;
    showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> ติด 💗Charm Curse ${turns} Turn`,()=>{
      p.mp-=skill.mp;
      skillFC.hasUsedSkill=true;
      targetFC.charmed={originalPi:targetPi,originalLine:targetLine+'Line'};
      targetFC.curses=(targetFC.curses||[]);
      targetFC.curses.push({type:'charm',expiresAtSubTurn:subTurnNum+(turns*2)});
      targetFC.exhausted=false;targetFC.hasUsedSkill=false;
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} ติด Charm Curse — อยู่ภายใต้การควบคุมของเรา ${turns} Turn!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='atBoost1SubTurn'){
    showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> +At 1 จนจบ Subturn`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      targetFC.atBoosts=(targetFC.atBoosts||[]);
      targetFC.atBoosts.push({amount:1,expiresBeforeSubTurn:subTurnNum+1});
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} +At 1 จนจบ Subturn!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='spBoost1SubTurn'){
    showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> +Sp 1 จนจบ Subturn`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      targetFC.spBoosts=(targetFC.spBoosts||[]);
      targetFC.spBoosts.push({amount:1,expiresBeforeSubTurn:subTurnNum+1});
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} +Sp 1 จนจบ Subturn!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='dfBoostMc'){
    const boostAmt=targetFC.card.mc;
    showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> +Df${boostAmt} จนจบ Subturn`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      targetFC.dfBoosts=(targetFC.dfBoosts||[]);
      targetFC.dfBoosts.push({amount:boostAmt,expiresBeforeSubTurn:subTurnNum+1});
      log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} +Df${boostAmt} (Mc=${boostAmt}) จนจบ Subturn!`,'good');
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='frozenToHand'){
    showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> (Freeze) ขึ้นมือ`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      const owner=G.players[targetPi];
      const fromArr=targetLine==='at'?owner.atLine:owner.dfLine;
      const i=fromArr.findIndex(x=>x.uid===targetFC.uid);
      if(i>=0){
        fromArr.splice(i,1);
        if(targetFC.fusionStack?.length)targetFC.fusionStack.forEach(m=>owner.shrine.push(m.card));
        // Only Main Seal returns to hand
        if(targetPi===0){
          if(p.hand.length<HAND_MAX){p.hand.push(targetFC.card);log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} กลับสู่มือ!`,'good');}
          else{p.shrine.push(targetFC.card);log(`มือเต็ม — ${targetFC.card.name} ลง Shrine`,'bad');}
        } else {
          // Enemy frozen seal returns to their hand
          const ai=G.players[1];
          ai.hand.push(targetFC.card);
          log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} (ศัตรู) ขึ้นมือ!`,'good');
        }
      }
      checkLose();render();
    });
    return;
  }

  if(skill.effect==='destroyOneMystic'){
    const actMys=getActiveMystics(targetFC);
    const doDestroy=mEntry=>{
      showActionQueue(`${skillFC.card.name} [Skill] → ทำลาย Mystic <b>${mEntry.mystic.name}</b> บน ${targetFC.card.name}`,()=>{
        p.mp-=skill.mp;skillFC.hasUsedSkill=true;
        const mIdx=(targetFC.mystics||[]).indexOf(mEntry);
        if(mIdx>=0)targetFC.mystics.splice(mIdx,1);
        log(`${skillFC.card.name} [Skill]: ทำลาย ${mEntry.mystic.name} บน ${targetFC.card.name}!`,'good');
        checkLose();render();
      });
    };
    if(actMys.length===1){doDestroy(actMys[0]);}
    else{
      showMysticPicker(`Titania: เลือก Mystic ที่จะทำลายบน ${targetFC.card.name}`,
        actMys.map(m=>({label:m.mystic.name,data:m})),
        m=>doDestroy(m));
    }
    return;
  }
  if(skill.effect==='sacrificeStep1'){
    const mc=targetFC.card.mc;
    showActionQueue(`${skillFC.card.name} [Skill] → Sacrifice <b>${targetFC.card.name}</b> (Mc=${mc})`,()=>{
      p.mp-=skill.mp;skillFC.hasUsedSkill=true;
      sendToShrine(targetFC,0);
      pendingSacrifice={skillFC,mc};
      skillMode={fc:skillFC,skillIdx:-99};
      log(`${skillFC.card.name} [Skill]: Sacrifice ${targetFC.card.name}! เลือก Seal ที่จะ +At${mc} (1 Turn)...`,'hi');
      checkLose();render();
    });
    return;
  }

  // Default: return to deck (Fairy Music Box id=3)
  showActionQueue(`${skillFC.card.name} [Skill] → <b>${targetFC.card.name}</b> คืนกอง`,()=>{
    p.mp-=skill.mp;
    skillFC.hasUsedSkill=true;
    const owner=G.players[targetPi];
    const fromArr=targetLine==='at'?owner.atLine:owner.dfLine;
    const i=fromArr.findIndex(x=>x.uid===targetFC.uid);
    if(i>=0)fromArr.splice(i,1);
    if(targetFC.fusionStack&&targetFC.fusionStack.length){
      targetFC.fusionStack.forEach(m=>owner.shrine.push(m.card));
    }
    owner.deck.push(targetFC.card);
    shuffle(owner.deck);
    log(`${skillFC.card.name} [Skill]: ${targetFC.card.name} ถูกส่งคืนกอง!`,'good');
    checkLose();render();
  });
}

function clickAIHandCard(idx){
  if(!handTargetMode||!attackerSeal)return;
  if(handAttackedThisTurn){log('โจมตีมือได้แค่ครั้งเดียวต่อเทิร์น','bad');cancelAction();return;}
  const ai=G.players[1];
  if(idx>=ai.hand.length)return;
  const card=ai.hand[idx];
  const attFC=attackerSeal.fc;
  handTargetMode=false;attackerSeal=null;
  handAttackAnim(attFC,card,()=>{
    ai.hand.splice(ai.hand.indexOf(card),1);
    ai.shrine.push(card);
    log(`${attFC.card.name} โจมตีมือ AI → ${card.name} ลง Shrine! (+Lv${card.lv})`,'good');
    attFC.exhausted=true;attFC.hasAttacked=true;
    handAttackedThisTurn=true;
    checkLose();render();
  });
}

// BATTLE
